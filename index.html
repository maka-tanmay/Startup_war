<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SparkTank | Collaborative Ideation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              indigo: {
                accent: '#6366f1',
                flux: '#a3a6ff',
              },
              dark: {
                bg: '#060e20',
                surface: '#0f1930',
                card: '#192540',
              }
            },
            fontFamily: {
              outfit: ['Outfit', 'sans-serif'],
              space: ['Space Grotesk', 'sans-serif'],
            },
            borderRadius: {
              'xl': '1rem',
              '2xl': '1.5rem',
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-[#060e20] text-[#dee5ff] font-outfit">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
